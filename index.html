 {id:'waterwise',cat:'stem',title:{en:'STEM 2024: WaterWise Tap',ar:'STEM 2024: WaterWise Tap',fr:'STEM 2024 : WaterWise Tap'},image:'assets/project-waterwise-tap.png',desc:{en:'For STEM 2024, my team built WaterWise Tap, a smart water-conservation prototype using Arduino, sensors, and everyday tools to encourage reduced water waste.',ar:'في STEM 2024، بنى فريقي WaterWise Tap، وهو نموذج ذكي لترشيد المياه باستخدام Arduino والحساسات وأدوات بسيطة لتقليل الهدر.',fr:'Pour STEM 2024, mon équipe a créé WaterWise Tap, un prototype de conservation d’eau avec Arduino, capteurs et outils simples.'},detail:{en:'This project connected embedded systems with a simple everyday problem: water waste. It gave me practice in prototyping, testing, explaining technical choices, and making a concept easy for people to understand.',ar:'ربط هذا المشروع الأنظمة المدمجة بمشكلة يومية بسيطة: هدر المياه. منحني تدريبًا على النمذجة، والاختبار، وشرح القرارات التقنية، وتبسيط الفكرة للناس.',fr:'Ce projet a relié les systèmes embarqués à un problème quotidien : le gaspillage d’eau. Il m’a entraînée au prototypage, aux tests et à l’explication claire des choix techniques.'},tags:['STEM','Arduino','Prototype']},

 {id:'healthpod',cat:'other research',title:{en:'HealthPod India',ar:'HealthPod India',fr:'HealthPod India'},image:'assets/project-healthpod.png',url:'https://healthpod-india.com/',desc:{en:'For a university course in 2026, our team of six surveyed students, followed the scientific method, created a demo concept, and published a website for digital health pods.',ar:'في مقرر جامعي عام 2026، عمل فريقنا المكوّن من ستة طلاب على استطلاع الطلاب، واتباع المنهج العلمي، وصناعة نموذج فكرة، ونشر موقع لمنصات صحية رقمية.',fr:'Dans un cours universitaire en 2026, notre équipe de six a interrogé des étudiants, suivi la méthode scientifique, créé un concept de démo et publié un site pour des pods de santé numériques.'},detail:{en:'HealthPod India helped me practice teamwork, survey design, scientific reasoning, and turning a research idea into a demo people could visit and discuss.',ar:'ساعدني HealthPod India على ممارسة العمل الجماعي، وتصميم الاستبيان، والتفكير العلمي، وتحويل فكرة بحثية إلى عرض يمكن للناس زيارته ومناقشته.',fr:'HealthPod India m’a entraînée au travail d’équipe, au sondage, au raisonnement scientifique et à la transformation d’une idée en démo visible.'},tags:['University','Research','Website']},

function imageBox(src,label,cls='',alt=''){return `<div class="${cls} image-shell"><img src="${esc(src)}" alt="${esc(alt||label)}"><span class="image-label">${esc(label)}</span></div>`}function modalImage(src,label,alt=''){return imageBox(src,label,'modal-image-wrap',alt)}function logo(src,label){return `<img src="${esc(src)}" alt="" aria-hidden="true" onerror="this.outerHTML='<span class=&quot;custom-logo&quot;>${esc(label).slice(0,3)}</span>'">`}
function setStatic(){document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';$('[data-t=skip]').textContent=T('skip');document.title=`Leen Ghaloul | ${T((location.hash.replace('#','')==='projects'?'exp':location.hash.replace('#',''))||'home')}`}
function renderNav(){const navs=[['home',T('home')],['skills',T('skills')],['projects',T('exp')],['beyond',T('beyond')],['contact',T('contact')]];$('#navList').innerHTML=navs.map(n=>`<li><button class="nav-link" type="button" data-route="${n[0]}">${n[1]}</button></li>`).join('')+`<li><button class="dock-btn lang-btn ${lang==='en'?'active':''}" data-lang="en">EN</button></li><li><button class="dock-btn lang-btn ${lang==='ar'?'active':''}" data-lang="ar">AR</button></li><li><button class="dock-btn lang-btn ${lang==='fr'?'active':''}" data-lang="fr">FR</button></li><li><button class="dock-btn" id="darkBtn" aria-pressed="true">${T('dark')}</button></li><li><button class="dock-btn" id="contrastBtn" aria-pressed="false">${T('contrast')}</button></li>`;$('#commandTitle').textContent=T('cmd');$('#commandList').innerHTML=navs.map(n=>`<button class="command-item" type="button" data-route="${n[0]}"><span>${n[1]}</span><span>↵</span></button>`).join('');bindNavTheme()}
function renderAll(){setStatic();renderNav();$('#main').innerHTML=homeHTML()+skillsHTML()+projectsHTML()+beyondHTML()+contactHTML();bindEvents();showPage(location.hash.replace('#','')||'home',false)}
function homeHTML(){return `<section class="view active" id="home" data-view="home"><div class="hero-grid"><div><h1 class="page-title">My Portfolio</h1><div class="hero-actions"><a class="btn primary" href="https://www.linkedin.com/in/leen-ghaloul-983632198" target="_blank" rel="noopener">${T('linkedin')}</a><a class="btn" href="cv.pdf" download="Leen-Ghaloul-CV.pdf">${T('cv')}</a></div></div><div class="hero-panel"><div class="glass-card terminal"><div class="terminal-top"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div><div class="terminal-body"><p>${T('homeText')}</p></div></div></div></div></section>`}
function skillsHTML(){const keys=Object.keys(tabs),tabBtns=keys.map((k,i)=>`<button class="tab-btn ${i?'':'active'}" data-tab="${k}">${loc(tabs[k])}</button>`).join(''),panes=keys.map((k,i)=>`<div class="skill-pane ${i?'':'active'}" data-skill-pane="${k}">${skillsPane(k)}</div>`).join('');return `<section class="view" id="skills" data-view="skills"><p class="page-kicker">${T('kSkills')}</p><div class="tab-row">${tabBtns}</div>${panes}<div class="embedded-certifications" id="certificationsGallery"><p class="page-kicker">${T('certs')}</p><div class="cert-gallery">${certificates.map(c=>`<article class="certificate-piece"><div class="certificate-preview blurred-preview"><img src="${esc(c.image)}" alt="${esc(loc(c.title))}"></div><div class="certificate-body"><h3>${loc(c.title)}</h3><p><strong>${esc(c.provider)}</strong></p><p><strong>${esc(c.date)}</strong></p><button class="btn small primary view-cert" data-cert="${c.id}">${T('view')}</button></div></article>`).join('')}</div></div></section>`}
function skillsPane(k){if(skills[k])return `<div class="tool-grid">${skills[k].map(s=>`<article class="tool-card" tabindex="0" data-skill-id="${s.id}">${logo(s.icon,s.title)}<strong>${s.title}</strong><small>${lang==='en'?'Click to learn more.':lang==='ar'?'اضغط لمعرفة المزيد.':'Cliquez pour en savoir plus.'}</small></article>`).join('')}</div>`;if(k==='soft')return `<div class="mini-grid">${soft.map(x=>`<div class="mini-card"><strong>${loc(x.title)}</strong><span>${loc(x.text)}</span></div>`).join('')}</div>`;return `<div class="mini-grid">${languages.map(x=>`<div class="mini-card"><strong class="lang-title"><span class="flag-shape flag-${x.flag}" aria-hidden="true"></span>${loc(x.title)}</strong><span>${loc(x.text)}</span></div>`).join('')}</div>`}
function projectsHTML(){return `<section class="view" id="projects" data-view="projects"><p class="page-kicker">${T('exp')}</p><div class="filter-row"><button class="filter-btn active" data-filter="all">${T('all')}</button><button class="filter-btn" data-filter="stem">STEM</button><button class="filter-btn" data-filter="research">${T('research')}</button><button class="filter-btn" data-filter="other">${T('other')}</button></div><div class="project-grid">${projects.map(p=>`<article class="project-card" data-categories="${p.cat}">${imageBox(p.image,loc(p.title),'project-thumb',loc(p.title))}<div class="project-body"><h3>${loc(p.title)}</h3><p>${loc(p.desc)}</p><div class="tag-row">${p.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div><button class="btn small primary open-project" data-project="${p.id}">${T('check')}</button></div></article>`).join('')}</div></section>`}
function beyondHTML(){return `<section class="view" id="beyond" data-view="beyond"><p class="page-kicker">${T('kBeyond')}</p><div class="split-grid"><article class="content-card"><h2>${T('side')}</h2><p>${T('sideText')}</p><div class="row-actions"><button class="btn subtle open-cert-direct" data-cert="ymhfa">${T('ymhfaBtn')}</button></div></article><article class="content-card"><h2>${T('beyond')}</h2><div class="timeline"><div class="timeline-item"><div class="timeline-year">${T('vol')}</div><div><p>${T('volText')}</p></div></div><div class="timeline-item"><div class="timeline-year">${T('tennis')}</div><div><p>${T('tennisText')}</p></div></div><div class="timeline-item"><div class="timeline-year">${T('piano')}</div><div><p>${T('pianoText')}</p></div></div><div class="timeline-item"><div class="timeline-year">${T('uniExtra')}</div><div><p>${T('uniExtraText')}</p></div></div></div></article><div class="embedded-highschool"><p class="page-kicker">${T('highschool')}</p><p class="section-subtitle">${T('highschoolSub')}</p><div class="archive-grid">${highschool.map(a=>`<article class="gallery-card open-gallery" tabindex="0" data-gallery="${a.id}">${imageBox(a.image,loc(a.title),'gallery-image blurred-preview',loc(a.title))}<div class="gallery-body"><h3>${loc(a.title)}</h3><p>${loc(a.desc)}</p></div></article>`).join('')}</div></div></div></section>`}
function contactHTML(){return `<section class="view" id="contact" data-view="contact"><p class="page-kicker">${T('contact')}</p><h1 class="page-title">${T('getTouch')}</h1><div class="contact-grid"><div class="row-actions"><a class="btn primary" href="https://www.linkedin.com/in/leen-ghaloul-983632198" target="_blank" rel="noopener">${T('linkedin')}</a><a class="btn" href="cv.pdf" download="Leen-Ghaloul-CV.pdf">${T('cv')}</a></div><article class="content-card"><form id="contactForm"><label><span>${T('name')}</span><input name="name" required placeholder="${T('yourName')}"></label><label><span>${T('email')}</span><input type="email" name="email" required placeholder="your@email.com"></label><label><span>${T('message')}</span><textarea name="message" required placeholder="${T('writeMsg')}"></textarea></label><button class="btn primary" type="submit">${T('send')}</button><p class="form-status" id="formStatus" role="status"></p></form></article></div></section>`}
function findSkill(id){for(const group of Object.values(skills)){const item=group.find(s=>s.id===id);if(item)return item}return null}
function openCertificate(id){const c=certificates.find(x=>x.id===id);const link=c.pdf?`<div class="row-actions"><a class="btn primary" href="${esc(c.pdf)}" target="_blank" rel="noopener">${T('view')}</a></div>`:'';openModal(T('certs'),loc(c.title),[modalImage(c.image,loc(c.title),loc(c.title)),`<p><strong>${esc(c.provider)}</strong></p><p><strong>${esc(c.date)}</strong></p><p>${loc(c.desc)}</p>`,link])}
function bindNavTheme(){$$('[data-route]').forEach(e=>e.onclick=()=>{showPage(e.dataset.route);$('#commandBackdrop').classList.remove('show')});$$('.lang-btn').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;localStorage.setItem('portfolioLang',lang);renderAll();notice(T('lang'))});const d=$('#darkBtn'),c=$('#contrastBtn');if(d)d.onclick=()=>{document.body.classList.toggle('light-theme');localStorage.setItem('lightTheme',document.body.classList.contains('light-theme')?'yes':'no');notice(document.body.classList.contains('light-theme')?T('light'):T('darkOn'));updateMode()};if(c)c.onclick=()=>{document.body.classList.toggle('contrast-theme');localStorage.setItem('contrastTheme',document.body.classList.contains('contrast-theme')?'yes':'no');notice(document.body.classList.contains('contrast-theme')?T('contrastOn'):T('contrastOff'));updateMode()};updateMode()}
function bindEvents(){$$('.tab-btn').forEach(b=>b.onclick=()=>{$$('.tab-btn').forEach(x=>x.classList.toggle('active',x===b));$$('.skill-pane').forEach(p=>p.classList.toggle('active',p.dataset.skillPane===b.dataset.tab));notice(T('opened')+b.textContent.trim())});$$('.tool-card').forEach(c=>{const f=()=>{const s=findSkill(c.dataset.skillId);openModal(lang==='en'?'Skill detail':lang==='ar'?'تفاصيل المهارة':'Détail de la compétence',s.title,[`<p>${loc(s.detail)}</p>`])};c.onclick=f;c.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();f()}}});$$('.view-cert').forEach(b=>b.onclick=()=>openCertificate(b.dataset.cert));$$('.open-cert-direct').forEach(b=>b.onclick=()=>openCertificate(b.dataset.cert));$$('.open-project').forEach(b=>b.onclick=()=>{const p=projects.find(x=>x.id===b.dataset.project);const projectLink=p.url?`<div class="row-actions"><a class="btn primary" href="${esc(p.url)}" target="_blank" rel="noopener">${T('check')}</a></div>`:'';openModal(T('exp'),loc(p.title),[modalImage(p.image,loc(p.title),loc(p.title)),`<p>${loc(p.desc)}</p><p>${loc(p.detail)}</p>`,projectLink])});$$('.open-gallery').forEach(g=>{const f=()=>{const a=highschool.find(x=>x.id===g.dataset.gallery);const link=a.url?`<div class="row-actions"><a class="btn primary" href="${esc(a.url)}" target="_blank" rel="noopener">${a.id==='recognition'?(lang==='en'?'Watch Class of 2025 video':lang==='ar'?'شاهد فيديو دفعة 2025':'Voir la vidéo Class of 2025'):T('check')}</a></div>`:'';openModal(T('highschool'),loc(a.title),[modalImage(a.image,loc(a.title),loc(a.title)),`<p>${loc(a.desc)}</p>`,link])};g.onclick=f;g.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();f()}}});$$('.filter-btn').forEach(b=>b.onclick=()=>{$$('.filter-btn').forEach(x=>x.classList.toggle('active',x===b));$$('.project-card').forEach(c=>{const cats=c.dataset.categories;c.style.display=b.dataset.filter==='all'||cats.includes(b.dataset.filter)?'':'none'});notice(T('filter')+b.textContent.trim())});const f=$('#contactForm');if(f)f.onsubmit=e=>{e.preventDefault();const fd=new FormData(f),name=String(fd.get('name')||'').trim(),email=String(fd.get('email')||'').trim(),msg=String(fd.get('message')||'').trim(),s=$('#formStatus');if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){s.textContent=T('invalid');notice(T('invalid'));return}if(!msg){s.textContent=T('empty');notice(T('empty'));return}const subject=encodeURIComponent(`Portfolio message from ${name||'website visitor'}`),body=encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\nMessage:\n${msg}`);window.location.href=`mailto:ghaloulleen@gmail.com?subject=${subject}&body=${body}`;s.textContent=T('validated');notice(T('success'));f.reset()}}
function openModal(k,title,parts){$('#modalKicker').textContent=k;$('#modalTitle').textContent=title;$('#modalContent').innerHTML=parts.join('');$('#modalBackdrop').classList.add('show');$('#closeModal').focus()}function closeModal(){$('#modalBackdrop').classList.remove('show')}$('#closeModal').onclick=closeModal;$('#modalBackdrop').onclick=e=>{if(e.target.id==='modalBackdrop')closeModal()};$('#closeCommand').onclick=()=>$('#commandBackdrop').classList.remove('show');$('#commandBackdrop').onclick=e=>{if(e.target.id==='commandBackdrop')$('#commandBackdrop').classList.remove('show')};function showPage(route,push=true){const v=document.querySelector(`[data-view="${route}"]`);if(!v){showPage('home',false);return}$$('.view').forEach(s=>s.classList.toggle('active',s.dataset.view===route));$$('.nav-link').forEach(b=>b.classList.toggle('active',b.dataset.route===route));if(push)history.pushState(null,'','#'+route);document.title=`Leen Ghaloul | ${T(route==='projects'?'exp':route)}`;$('#navList').classList.remove('open');$('#mobileMenu').setAttribute('aria-expanded','false');window.scrollTo({top:0,behavior:document.body.classList.contains('reduce-motion')?'auto':'smooth'})}function notice(m){const n=$('#visualNotice');n.textContent=m;n.classList.add('show');clearTimeout(window.noticeTimer);window.noticeTimer=setTimeout(()=>n.classList.remove('show'),2600)}function updateMode(){const d=$('#darkBtn'),c=$('#contrastBtn');if(d)d.setAttribute('aria-pressed',String(!document.body.classList.contains('light-theme')));if(c)c.setAttribute('aria-pressed',String(document.body.classList.contains('contrast-theme')))}$('#mobileMenu').onclick=()=>{const open=$('#navList').classList.toggle('open');$('#mobileMenu').setAttribute('aria-expanded',String(open))};document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();$('#commandBackdrop').classList.add('show');$('.command-item',$('#commandBackdrop')).focus()}if(e.key==='Escape'){closeModal();$('#commandBackdrop').classList.remove('show')}});window.addEventListener('popstate',()=>showPage(location.hash.replace('#','')||'home',false));if(localStorage.getItem('lightTheme')==='yes')document.body.classList.add('light-theme');if(localStorage.getItem('contrastTheme')==='yes')document.body.classList.add('contrast-theme');if(matchMedia('(prefers-reduced-motion: reduce)').matches)document.body.classList.add('reduce-motion');renderAll();
</script>
